<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eldest Boy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Work+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/chicagoflf" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    body {
      background: #000;
      font-family: 'Work Sans', sans-serif;
    }

    /* Mode selector */
    .mode-selector {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 0;
    }

    .mode-btn {
      font-family: 'ChicagoFLF', sans-serif;
      font-size: 0.85rem;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 18px;
      cursor: pointer;
      transition: all 0.3s;
      opacity: 0.5;
    }

    .mode-btn:first-child { border-radius: 4px 0 0 4px; }
    .mode-btn:last-child { border-radius: 0 4px 4px 0; }

    .mode-btn.active {
      opacity: 1;
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.6);
    }

    .mode-btn:hover { opacity: 0.8; }

    /* Bouncing mode styles */
    .bouncing-img {
      position: absolute;
      width: 180px;
      height: auto;
      object-fit: contain;
      border-radius: 8px;
      opacity: 1;
      cursor: pointer;
    }

    .center-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      color: #fff;
      pointer-events: none;
    }

    .center-text h1 {
      font-family: 'Gasoek One', sans-serif;
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 400;
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.3em;
    }

    .bouncing-word {
      position: absolute;
      font-family: 'ChicagoFLF', sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.6rem);
      font-weight: 400;
      text-transform: uppercase;
      color: #fff;
      opacity: 0.7;
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
    }

    .center-text a {
      display: inline-block;
      margin-top: 1.5em;
      color: #fff;
      font-size: clamp(0.85rem, 2vw, 1.1rem);
      font-weight: 400;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.3s;
      pointer-events: auto;
    }

    .center-text a:hover {
      opacity: 1;
    }

    /* Space Invaders mode */
    #invaders-container {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    #invaders-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .game-overlay {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 20;
      color: #fff;
      pointer-events: none;
      display: none;
    }

    .game-overlay h2 {
      font-family: 'Gasoek One', sans-serif;
      font-size: clamp(2rem, 6vw, 4rem);
      text-transform: uppercase;
      margin-bottom: 0.3em;
    }

    .game-overlay p {
      font-family: 'ChicagoFLF', sans-serif;
      font-size: clamp(0.8rem, 2vw, 1.2rem);
      opacity: 0.7;
    }

    #score-display {
      position: fixed;
      top: 50px;
      right: 20px;
      z-index: 20;
      color: #fff;
      font-family: 'ChicagoFLF', sans-serif;
      font-size: 1.2rem;
      display: none;
    }

    #easy-steve-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 100;
      font-family: 'ChicagoFLF', sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      opacity: 0.4;
      transition: all 0.3s;
      display: none;
    }

    #easy-steve-btn:hover { opacity: 0.8; }
    #easy-steve-btn.active { opacity: 1; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.6); }

    @media (max-width: 600px) {
      .bouncing-img {
        width: 100px;
      }

      .center-text h1 {
        font-size: clamp(2rem, 12vw, 3.5rem);
      }

      .bouncing-word {
        font-size: clamp(0.75rem, 3.5vw, 1rem);
      }

      .mode-btn {
        font-size: 0.7rem;
        padding: 5px 12px;
      }
    }
  </style>
</head>
<body>
  <!-- Mode selector -->
  <div class="mode-selector">
    <button class="mode-btn active" data-mode="bounce">Mode 1</button>
    <button class="mode-btn" data-mode="invaders">Mode 2</button>
  </div>

  <!-- Bounce mode elements -->
  <div id="bounce-container">
    <video id="img1" class="bouncing-img" src="TwoPeople_PolyReduce_v03b.mp4" autoplay loop muted playsinline></video>
    <video id="img2" class="bouncing-img" src="TwoPeople_PolyReduce_v03.mp4" autoplay loop muted playsinline></video>

    <div class="center-text">
      <h1>Eldest Boy</h1>
      <a href="https://instagram.com/eldestboymusic" target="_blank" aria-label="Instagram">
        <svg width="28" height="28" viewBox="0 0 448 512" fill="currentColor"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9S160.5 370.9 224.1 370.9 339 319.5 339 255.9 287.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1S3.8 127.7 2 163.6c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>
      </a>
    </div>

    <span id="word1" class="bouncing-word">New</span>
    <span id="word2" class="bouncing-word">Music</span>
    <span id="word3" class="bouncing-word">Soon</span>
  </div>

  <!-- Space Invaders mode -->
  <div id="invaders-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="game-overlay" class="game-overlay">
    <h2 id="overlay-title">Eldest Boy Invaders</h2>
    <p id="overlay-text">Press Space or Tap to Start</p>
  </div>
  <div id="score-display">Score: <span id="score-val">0</span></div>
  <button id="easy-steve-btn">Easy Steve Mode</button>

  <script>
    // ========================
    // MODE SWITCHING
    // ========================
    let currentMode = 'bounce';
    let bounceAnimId = null;
    let gameRunning = false;

    const bounceContainer = document.getElementById('bounce-container');
    const invadersContainer = document.getElementById('invaders-container');
    const modeBtns = document.querySelectorAll('.mode-btn');

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        if (mode === currentMode) return;
        currentMode = mode;
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        switchMode(mode);
      });
    });

    const easySteveBtn = document.getElementById('easy-steve-btn');
    let easySteve = false;

    easySteveBtn.addEventListener('click', () => {
      easySteve = !easySteve;
      easySteveBtn.classList.toggle('active', easySteve);
      // If we're on the idle/gameover screen, update the text
      if (gameState === 'idle' || gameState === 'gameover') {
        overlayTitle.textContent = easySteve ? 'Easy Steve Mode' : 'Eldest Boy Invaders';
      }
    });

    function switchMode(mode) {
      if (mode === 'bounce') {
        invadersContainer.style.display = 'none';
        document.getElementById('game-overlay').style.display = 'none';
        document.getElementById('score-display').style.display = 'none';
        easySteveBtn.style.display = 'none';
        bounceContainer.style.display = '';
        stopGame();
        startBounce();
      } else {
        bounceContainer.style.display = 'none';
        stopBounce();
        invadersContainer.style.display = 'block';
        document.getElementById('score-display').style.display = 'block';
        easySteveBtn.style.display = 'block';
        initGame();
      }
    }

    // ========================
    // BOUNCE MODE
    // ========================
    const bouncers = [];

    class Bouncer {
      constructor(el, vx, vy, rotSpeed) {
        this.el = el;
        this.x = Math.random() * (window.innerWidth - el.offsetWidth);
        this.y = Math.random() * (window.innerHeight - el.offsetHeight);
        this.vx = vx;
        this.vy = vy;
        this.angle = rotSpeed ? Math.random() * 360 : 0;
        this.rotSpeed = rotSpeed;
        this.el.style.left = this.x + 'px';
        this.el.style.top = this.y + 'px';
      }

      update() {
        const w = this.el.offsetWidth;
        const h = this.el.offsetHeight;
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.rotSpeed;
        if (this.x <= 0 || this.x + w >= window.innerWidth) {
          this.vx *= -1;
          this.x = Math.max(0, Math.min(this.x, window.innerWidth - w));
        }
        if (this.y <= 0 || this.y + h >= window.innerHeight) {
          this.vy *= -1;
          this.y = Math.max(0, Math.min(this.y, window.innerHeight - h));
        }
        this.el.style.left = this.x + 'px';
        this.el.style.top = this.y + 'px';
        this.el.style.transform = `rotate(${this.angle}deg)`;
      }
    }

    const img1 = document.getElementById('img1');
    const img2 = document.getElementById('img2');
    const word1 = document.getElementById('word1');
    const word2 = document.getElementById('word2');
    const word3 = document.getElementById('word3');

    function randRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function splitVideo(bouncer) {
      const oldEl = bouncer.el;
      const oldWidth = oldEl.offsetWidth;
      const newWidth = oldWidth / 2;
      const idx = bouncers.indexOf(bouncer);
      if (idx !== -1) bouncers.splice(idx, 1);
      oldEl.remove();
      for (let i = 0; i < 2; i++) {
        const video = document.createElement('video');
        video.className = 'bouncing-img';
        video.src = oldEl.src;
        video.autoplay = true;
        video.loop = true;
        video.muted = true;
        video.playsInline = true;
        video.style.width = newWidth + 'px';
        bounceContainer.appendChild(video);
        const offsetX = (i === 0 ? -newWidth * 0.6 : newWidth * 0.6);
        const offsetY = (i === 0 ? -newWidth * 0.4 : newWidth * 0.4);
        const speed = Math.sqrt(bouncer.vx * bouncer.vx + bouncer.vy * bouncer.vy);
        const angle = Math.atan2(bouncer.vy, bouncer.vx) + (i === 0 ? -0.8 : 0.8);
        const newVx = speed * Math.cos(angle);
        const newVy = speed * Math.sin(angle);
        const b = new Bouncer(video, newVx, newVy, bouncer.rotSpeed * (i === 0 ? 1.2 : -1.2));
        b.x = Math.max(0, Math.min(bouncer.x + offsetX, window.innerWidth - newWidth));
        b.y = Math.max(0, Math.min(bouncer.y + offsetY, window.innerHeight - newWidth));
        b.angle = bouncer.angle;
        video.addEventListener('click', () => splitVideo(b));
        bouncers.push(b);
      }
    }

    function initBounce() {
      const speed1 = randRange(0.3, 0.6);
      const speed2 = randRange(0.3, 0.6);
      const b1 = new Bouncer(img1, speed1, randRange(0.3, 0.5), randRange(0.1, 0.2));
      const b2 = new Bouncer(img2, -speed2, randRange(0.3, 0.5), -randRange(0.1, 0.2));
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      b1.x = randRange(0, vw * 0.3);
      b1.y = randRange(0, vh * 0.3);
      b2.x = randRange(vw * 0.5, vw - img2.offsetWidth);
      b2.y = randRange(vh * 0.5, vh - img2.offsetHeight);
      img1.addEventListener('click', () => splitVideo(b1));
      img2.addEventListener('click', () => splitVideo(b2));
      bouncers.push(b1, b2);
      const w1 = new Bouncer(word1, randRange(0.3, 0.7), randRange(0.2, 0.5), 0);
      const w2 = new Bouncer(word2, -randRange(0.3, 0.7), randRange(0.3, 0.6), 0);
      const w3 = new Bouncer(word3, randRange(0.2, 0.5), -randRange(0.3, 0.6), 0);
      bouncers.push(w1, w2, w3);
    }

    function collidePair(a, b) {
      const aw = a.el.offsetWidth, ah = a.el.offsetHeight;
      const bw = b.el.offsetWidth, bh = b.el.offsetHeight;
      const cx1 = a.x + aw / 2, cy1 = a.y + ah / 2;
      const cx2 = b.x + bw / 2, cy2 = b.y + bh / 2;
      const dx = cx2 - cx1, dy = cy2 - cy1;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minDist = (Math.max(aw, ah) + Math.max(bw, bh)) / 2;
      if (dist < minDist && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const relVx = a.vx - b.vx, relVy = a.vy - b.vy;
        const dot = relVx * nx + relVy * ny;
        if (dot > 0) {
          a.vx -= dot * nx; a.vy -= dot * ny;
          b.vx += dot * nx; b.vy += dot * ny;
        }
        const overlap = (minDist - dist) / 2;
        a.x -= nx * overlap; a.y -= ny * overlap;
        b.x += nx * overlap; b.y += ny * overlap;
      }
    }

    function animateBounce() {
      for (let i = 0; i < bouncers.length; i++)
        for (let j = i + 1; j < bouncers.length; j++)
          collidePair(bouncers[i], bouncers[j]);
      for (const b of bouncers) b.update();
      bounceAnimId = requestAnimationFrame(animateBounce);
    }

    function startBounce() {
      if (bounceAnimId) return;
      if (bouncers.length === 0) initBounce();
      animateBounce();
    }

    function stopBounce() {
      if (bounceAnimId) {
        cancelAnimationFrame(bounceAnimId);
        bounceAnimId = null;
      }
    }

    // Init bounce on load
    Promise.all([
      img1.readyState >= 1 ? Promise.resolve() : new Promise(r => img1.addEventListener('loadedmetadata', r, { once: true })),
      img2.readyState >= 1 ? Promise.resolve() : new Promise(r => img2.addEventListener('loadedmetadata', r, { once: true })),
    ]).then(() => {
      img2.currentTime = img2.duration / 2;
      startBounce();
    });

    window.addEventListener('resize', () => {
      for (const b of bouncers) {
        b.x = Math.min(b.x, window.innerWidth - b.el.offsetWidth);
        b.y = Math.min(b.y, window.innerHeight - b.el.offsetHeight);
      }
    });

    // ========================
    // SPACE INVADERS MODE
    // ========================
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('game-overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayText = document.getElementById('overlay-text');
    const scoreVal = document.getElementById('score-val');

    // Preload video frames as drawable sources
    const playerVideo = document.createElement('video');
    playerVideo.src = 'TwoPeople_PolyReduce_v03b.mp4';
    playerVideo.loop = true; playerVideo.muted = true; playerVideo.playsInline = true;

    const alienVideo = document.createElement('video');
    alienVideo.src = 'TwoPeople_PolyReduce_v03.mp4';
    alienVideo.loop = true; alienVideo.muted = true; alienVideo.playsInline = true;

    let game = null;
    let gameAnimId = null;
    let gameState = 'idle'; // idle, playing, gameover, won
    let currentWave = 1;
    let totalScore = 0;

    const keys = {};
    window.addEventListener('keydown', e => { keys[e.key] = true; });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function initGame() {
      resizeCanvas();
      playerVideo.play().catch(() => {});
      alienVideo.play().catch(() => {});
      gameState = 'idle';
      overlay.style.display = 'block';
      overlayTitle.textContent = 'Eldest Boy Invaders';
      overlayText.textContent = 'Press Space or Tap to Start';
      scoreVal.textContent = '0';
      if (gameAnimId) cancelAnimationFrame(gameAnimId);
      gameAnimId = requestAnimationFrame(gameLoop);
    }

    function startGame(wave) {
      if (!wave) {
        wave = 1;
        currentWave = 1;
        totalScore = 0;
      }
      resizeCanvas();
      const W = canvas.width, H = canvas.height;
      const playerW = Math.min(80, W * 0.1);
      const playerH = playerW * 0.75;
      const alienW = Math.min(50, W * 0.07);
      const alienH = alienW * 0.75;

      const aliens = [];

      if (easySteve) {
        // Easy Steve Mode: 1 big slow alien
        const bigW = Math.min(200, W * 0.25);
        const bigH = bigW * 0.75;
        aliens.push({
          x: W / 2 - bigW / 2,
          y: 80,
          w: bigW,
          h: bigH,
          alive: true
        });

        game = {
          player: { x: W / 2 - playerW / 2, y: H - playerH - 20, w: playerW, h: playerH },
          aliens,
          alienDir: 1,
          alienSpeed: 0.3,
          alienDropAmount: 0,
          bullets: [],
          alienBullets: [],
          score: 0,
          lastAlienShot: 0,
          alienShootInterval: 99999,
          playerSpeed: 5,
          bulletSpeed: 7,
          alienBulletSpeed: 0,
          lives: 99,
          hitFlash: 0,
          explosions: [],
          wave: 1,
          waveFlash: 60
        };
      } else {
        // Normal mode
        const cols = Math.min(10, Math.floor((W - 80) / (alienW + 20)), 6 + Math.floor(wave / 2));
        const rows = Math.min(7, 3 + Math.floor(wave / 2));
        const gridW = cols * (alienW + 20) - 20;
        const startX = (W - gridW) / 2;

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            aliens.push({
              x: startX + c * (alienW + 20),
              y: 70 + r * (alienH + 16),
              w: alienW,
              h: alienH,
              alive: true
            });
          }
        }

        const prevLives = game ? game.lives : 3;

        game = {
          player: { x: W / 2 - playerW / 2, y: H - playerH - 20, w: playerW, h: playerH },
          aliens,
          alienDir: 1,
          alienSpeed: 0.6 + (wave - 1) * 0.3,
          alienDropAmount: alienH * 0.6,
          bullets: [],
          alienBullets: [],
          score: 0,
          lastAlienShot: 0,
          alienShootInterval: Math.max(400, 1500 - (wave - 1) * 200),
          playerSpeed: 5,
          bulletSpeed: 7,
          alienBulletSpeed: 3 + wave * 0.5,
          lives: wave === 1 ? 3 : Math.min(prevLives + 1, 3),
          hitFlash: 0,
          explosions: [],
          wave: wave,
          waveFlash: 60
        };
      }

      gameState = 'playing';
      overlay.style.display = 'none';
      scoreVal.textContent = totalScore;
    }

    function stopGame() {
      gameRunning = false;
      if (gameAnimId) {
        cancelAnimationFrame(gameAnimId);
        gameAnimId = null;
      }
      playerVideo.pause();
      alienVideo.pause();
    }

    function gameLoop(ts) {
      if (currentMode !== 'invaders') return;
      gameAnimId = requestAnimationFrame(gameLoop);

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (gameState === 'idle') {
        // Draw preview
        const pw = 80, ph = 60;
        try { ctx.drawImage(playerVideo, canvas.width / 2 - pw / 2, canvas.height * 0.65, pw, ph); } catch(e) {}
        for (let i = 0; i < 5; i++) {
          try { ctx.drawImage(alienVideo, canvas.width * 0.2 + i * 70, canvas.height * 0.3, 50, 38); } catch(e) {}
        }
        return;
      }

      if (gameState !== 'playing') return;

      const g = game;
      const W = canvas.width, H = canvas.height;

      // Player movement
      if (keys['ArrowLeft'] || keys['a']) g.player.x -= g.playerSpeed;
      if (keys['ArrowRight'] || keys['d']) g.player.x += g.playerSpeed;
      g.player.x = Math.max(0, Math.min(g.player.x, W - g.player.w));

      // Player shooting
      if (keys[' '] && g.bullets.length < 3) {
        // Throttle shots
        const lastBullet = g.bullets[g.bullets.length - 1];
        if (!lastBullet || g.player.y - lastBullet.y > 60) {
          g.bullets.push({ x: g.player.x + g.player.w / 2 - 2, y: g.player.y, w: 4, h: 12 });
        }
      }

      // Update bullets
      g.bullets = g.bullets.filter(b => {
        b.y -= g.bulletSpeed;
        return b.y + b.h > 0;
      });

      // Alien movement
      let edgeHit = false;
      for (const a of g.aliens) {
        if (!a.alive) continue;
        if ((a.x + a.w >= W - 10 && g.alienDir > 0) || (a.x <= 10 && g.alienDir < 0)) {
          edgeHit = true;
          break;
        }
      }
      if (edgeHit) {
        g.alienDir *= -1;
        for (const a of g.aliens) {
          if (a.alive) a.y += g.alienDropAmount;
        }
      }
      for (const a of g.aliens) {
        if (a.alive) a.x += g.alienSpeed * g.alienDir;
      }

      // Alien shooting
      const now = performance.now();
      const aliveAliens = g.aliens.filter(a => a.alive);
      if (aliveAliens.length > 0 && now - g.lastAlienShot > g.alienShootInterval) {
        const shooter = aliveAliens[Math.floor(Math.random() * aliveAliens.length)];
        g.alienBullets.push({ x: shooter.x + shooter.w / 2 - 2, y: shooter.y + shooter.h, w: 4, h: 12 });
        g.lastAlienShot = now;
      }

      // Update alien bullets
      g.alienBullets = g.alienBullets.filter(b => {
        b.y += g.alienBulletSpeed;
        return b.y < H;
      });

      // Bullet-alien collisions
      for (const bullet of g.bullets) {
        for (const alien of g.aliens) {
          if (!alien.alive) continue;
          if (bullet.x < alien.x + alien.w && bullet.x + bullet.w > alien.x &&
              bullet.y < alien.y + alien.h && bullet.y + bullet.h > alien.y) {
            alien.alive = false;
            bullet.y = -100;
            // Spawn explosion particles
            const cx = alien.x + alien.w / 2;
            const cy = alien.y + alien.h / 2;
            for (let p = 0; p < 12; p++) {
              const angle = Math.random() * Math.PI * 2;
              const speed = 1 + Math.random() * 3;
              g.explosions.push({
                x: cx, y: cy,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                life: 30 + Math.random() * 20,
                maxLife: 30 + Math.random() * 20,
                size: 2 + Math.random() * 4,
                color: ['#fff', '#ff8800', '#ff4400', '#ffcc00'][Math.floor(Math.random() * 4)]
              });
            }
            g.score += 100;
            totalScore += 100;
            scoreVal.textContent = totalScore;
            // Speed up as fewer aliens remain
            const baseSpeed = 0.6 + (g.wave - 1) * 0.3;
            g.alienSpeed = baseSpeed + (1 - aliveAliens.length / g.aliens.length) * 2.5;
            const baseInterval = Math.max(400, 1500 - (g.wave - 1) * 200);
            g.alienShootInterval = Math.max(250, baseInterval - g.score * 0.5);
          }
        }
      }

      // Alien bullet-player collisions
      for (const ab of g.alienBullets) {
        if (ab.x < g.player.x + g.player.w && ab.x + ab.w > g.player.x &&
            ab.y < g.player.y + g.player.h && ab.y + ab.h > g.player.y) {
          ab.y = H + 100;
          g.lives--;
          g.hitFlash = 20;
          if (g.lives <= 0) {
            gameState = 'gameover';
            overlay.style.display = 'block';
            overlayTitle.textContent = 'Game Over';
            overlayText.textContent = `Wave ${currentWave} — Score: ${totalScore} — Press Space to Restart`;
            return;
          }
        }
      }

      // Aliens reach player
      for (const a of g.aliens) {
        if (a.alive && a.y + a.h >= g.player.y) {
          gameState = 'gameover';
          overlay.style.display = 'block';
          overlayTitle.textContent = 'Game Over';
          overlayText.textContent = `Score: ${g.score} — Press Space to Restart`;
          return;
        }
      }

      // Wave cleared
      if (g.aliens.every(a => !a.alive)) {
        if (easySteve) {
          gameState = 'gameover';
          overlay.style.display = 'block';
          overlayTitle.textContent = 'You Win, Steve!';
          overlayText.textContent = 'Press Space to Play Again';
          return;
        }
        currentWave++;
        startGame(currentWave);
        return;
      }

      // Draw player
      if (g.hitFlash > 0) {
        g.hitFlash--;
        if (g.hitFlash % 4 < 2) ctx.globalAlpha = 0.3;
      }
      try { ctx.drawImage(playerVideo, g.player.x, g.player.y, g.player.w, g.player.h); } catch(e) {}
      ctx.globalAlpha = 1;

      // Draw aliens
      for (const a of g.aliens) {
        if (!a.alive) continue;
        try { ctx.drawImage(alienVideo, a.x, a.y, a.w, a.h); } catch(e) {}
      }

      // Draw player bullets
      ctx.fillStyle = '#fff';
      for (const b of g.bullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }

      // Update and draw explosions
      g.explosions = g.explosions.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life--;
        return p.life > 0;
      });
      for (const p of g.explosions) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      }
      ctx.globalAlpha = 1;

      // Draw alien bullets
      ctx.fillStyle = '#ff4444';
      for (const b of g.alienBullets) {
        ctx.fillRect(b.x, b.y, b.w, b.h);
      }

      // Draw lives and wave
      ctx.fillStyle = '#fff';
      ctx.font = '16px ChicagoFLF, sans-serif';
      ctx.fillText('Lives: ' + g.lives, 20, canvas.height - 20);
      ctx.fillText('Wave ' + currentWave, 20, canvas.height - 44);

      // Wave announcement flash
      if (g.waveFlash > 0) {
        g.waveFlash--;
        const alpha = g.waveFlash / 60;
        ctx.globalAlpha = alpha;
        ctx.font = 'bold 48px Gasoek One, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('WAVE ' + currentWave, W / 2, H / 2);
        ctx.textAlign = 'start';
        ctx.globalAlpha = 1;
      }
    }

    // Start/restart on space or tap
    window.addEventListener('keydown', e => {
      if (e.key === ' ' && currentMode === 'invaders') {
        if (gameState === 'idle' || gameState === 'gameover') {
          e.preventDefault();
          startGame();
        }
      }
    });

    // Touch controls for mobile
    let touchX = null;
    window.addEventListener('touchstart', e => {
      if (currentMode !== 'invaders') return;
      if (gameState === 'idle' || gameState === 'gameover' || gameState === 'won') {
        startGame();
        return;
      }
      touchX = e.touches[0].clientX;
      // Shoot on tap
      if (game && game.bullets.length < 3) {
        const lastBullet = game.bullets[game.bullets.length - 1];
        if (!lastBullet || game.player.y - lastBullet.y > 60) {
          game.bullets.push({ x: game.player.x + game.player.w / 2 - 2, y: game.player.y, w: 4, h: 12 });
        }
      }
    });

    window.addEventListener('touchmove', e => {
      if (currentMode !== 'invaders' || gameState !== 'playing' || !game) return;
      e.preventDefault();
      const newX = e.touches[0].clientX;
      if (touchX !== null) {
        game.player.x += (newX - touchX);
        game.player.x = Math.max(0, Math.min(game.player.x, canvas.width - game.player.w));
      }
      touchX = newX;
    }, { passive: false });

    window.addEventListener('touchend', () => { touchX = null; });

    window.addEventListener('resize', () => {
      if (currentMode === 'invaders') resizeCanvas();
    });
  </script>
</body>
</html>
